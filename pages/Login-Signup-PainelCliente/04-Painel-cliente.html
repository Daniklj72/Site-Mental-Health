<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Conta</title>

    <link rel="stylesheet" href="assets/css/Painel-cliente.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content logotipo">
                <div class="logo"><a href="/Main-index.html" style="text-decoration: none; color: inherit; cursor: pointer;">
                    <h1>Mente<span>Positiva</span></h1></a>
                </div>
            </div>
        </div>
    </header>
    
    <main class="container">
        <h1 class="page-title">MINHA CONTA</h1>
        
        <div class="account-options">

            <!-- Primeira linha-->
            <div class="option-card" onclick="window.location.href='06-cadastro.html'">
                <div class="option-icon icon-profile"></div>
                <h3 class="option-title">Meu cadastro</h3>
            </div>
            
            <div class="option-card" onclick="window.location.href='trocar-senha.html'">
                <div class="option-icon icon-password"></div>
                <h3 class="option-title">Trocar senha</h3>
            </div>
            
            <div class="option-card" onclick="window.location.href='profissionais.html'">
                <div class="option-icon icon-tickets"></div>
                <h3 class="option-title">Profissionais</h3>
                <span class="notification-badge">6</span>
            </div>
            

            <!-- Segunda linha -->
            <div class="option-card" onclick="window.location.href='meus-enderecos.html'">
                <div class="option-icon icon-address"></div>
                <h3 class="option-title">Meu Endereço</h3>
            </div>

            <div class="option-card" onclick="window.location.href='05-consulta.html'">
                <div class="option-icon icon-consulta"></div>
                <h3 class="option-title">Consulta</h3>
            </div>
            
            <div class="option-card" onclick="logout()">
                <div class="option-icon icon-logout"></div>
                <h3 class="option-title">Sair</h3>
            </div>
        </div>
    </main>
    
    <script>
        // Verificar se o usuário está logado ao carregar a página
        document.addEventListener('DOMContentLoaded', function() {
            const isLoggedIn = localStorage.getItem('loggedIn');
            const userEmail = localStorage.getItem('userEmail');
            
            if (!isLoggedIn || isLoggedIn !== 'true') {
                // Se não estiver logado, redireciona para a página de login
                window.location.href = 'index.html';
            }
        });
        
        function logout() {
            if(confirm('Tem certeza que deseja sair?')) {
                // Limpar as informações de login do localStorage
                localStorage.removeItem('loggedIn');
                localStorage.removeItem('userEmail');
                
                // Redirecionar para a página de login
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
